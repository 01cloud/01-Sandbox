nameOverride: ""
fullnameOverride: ""

namespace: opensandbox-system

replicaCount: 1

# Dashboard Applications Config
# Adding items here will automatically create new cards in the dashboard.
backends:
  - id: "Z1_SANDBOX"
    name: "Z1 Sandbox"
    description: "Active remote backend for live code evaluation and execution workloads."
    baseUrl: "https://contests-name-publishers-off.trycloudflare.com/api/z1sandbox"
    documentationUrl: "https://contests-name-publishers-off.trycloudflare.com/api/z1sandbox/docs"
    icon: "terminal"
    color: "indigo"
  - id: "OPEN_SANDBOX"
    name: "OpenSandbox"
    description: "Distributed scaling cluster configuration and backend telemetry service."
    baseUrl: "https://contests-name-publishers-off.trycloudflare.com/api/opensandbox"
    documentationUrl: "https://contests-name-publishers-off.trycloudflare.com/api/opensandbox/docs"
    icon: "box"
    color: "emerald"

image:
  repository: z1sandbox-website
  tag: "latest"
  pullPolicy: Never   # uses local image built with: docker build -t z1sandbox-website:latest .

service:
  type: ClusterIP
  port: 80

# Auth0 configuration — baked into the JS bundle at docker build time
# These values are passed as --build-arg to docker build
auth0:
  domain: ""
  clientId: ""
  audience: ""

# The nginx upstream service name for API proxying.
# Must match the ClusterIP service name of the FastAPI backend in the same namespace.
apiServiceName: "sandbox-api-service"

ingress:
  enabled: false
  className: nginx
  host: "sandbox.local"   # replace with your actual domain
  annotations: {}
  # Example for Cloudflare tunnel or cert-manager:
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: "letsencrypt-prod"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
