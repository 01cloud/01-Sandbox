name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'apiServer/**'
      - 'code-interpreter/**'
      - 'codeInspector/**'
      - 'opensandbox-server/**'
      - 'opensandbox-controller/**'
      - 'codeInspector/**'
  pull_request:
    branches: [ main ]

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Next Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"

  filter:
    needs: versioning
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      scanner: ${{ steps.filter.outputs.scanner }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apiServer/**'
            scanner:
              - 'code-interpreter/**'
            infra:
              - 'codeInspector/**'
            server:
              - 'opensandbox-server/**'
            controller:
              - 'opensandbox-controller/**'
            codeInspector:
              - 'codeInspector/**'

  build-api:
    needs: [filter, versioning]
    if: needs.filter.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API Server
        uses: docker/build-push-action@v5
        with:
          context: ./apiServer/fastapi/
          push: true
          tags: |
            01community/01sandbox-api:latest
            01community/01sandbox-api:${{ needs.versioning.outputs.version }}

  build-scanner:
    needs: [filter, versioning]
    if: needs.filter.outputs.scanner == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Scanner
        uses: docker/build-push-action@v5
        with:
          context: ./code-interpreter
          push: true
          tags: |
            01community/01sandbox-codeinterpreter:latest
            01community/01sandbox-codeinterpreter:${{ needs.versioning.outputs.version }}
  
  build-server:
    needs: [filter, versioning]
    if: needs.filter.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./opensandbox-server
          push: true
          tags: |
            01community/01sandbox-opensandbox-server:latest
            01community/01sandbox-opensandbox-server:${{ needs.versioning.outputs.version }}

  build-controller:
    needs: [filter, versioning]
    if: needs.filter.outputs.controller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Controller
        uses: docker/build-push-action@v5
        with:
          context: ./opensandbox-controller
          push: true
          tags: |
            01community/01sandbox-opensandbox-controller:latest
            01community/01sandbox-opensandbox-controller:${{ needs.versioning.outputs.version }}

  deploy:
    needs: [filter, versioning, build-api, build-scanner, build-server, build-controller]
    if: |
      always() &&
      (needs.filter.outputs.infra == 'true' || 
       needs.build-api.result == 'success' || 
       needs.build-scanner.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          # Patch Kubeconfig to use public IP instead of localhost
          sed -i 's/127.0.0.1/148.113.4.247/g' ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Helm Lint
        run: helm lint ./codeInspector
      - name: Deploy to RKE2
        run: |
          VERSION=${{ needs.versioning.outputs.version }}
          helm upgrade --install codeinspector ./codeInspector \
            -n default \
            --atomic \
            --timeout 5m0s \
            --values ./codeInspector/values.yaml \
            --set apiServer.deployment.image.tag=${VERSION} \
            --set opensandbox.controller.image.tag=${VERSION} \
            --set opensandbox.server.image.tag=${VERSION} \
            --set opensandbox.server.sandboxImage=01community/01sandbox-codeinterpreter:${VERSION}
            
      - name: Update values.yaml in Repository
        run: |
          VERSION=${{ needs.versioning.outputs.version }}
          # Update API Tag
          sed -i "s/tag: \"[0-9.]*\"/tag: \"${VERSION}\"/g" ./codeInspector/values.yaml
          # Update Sandbox Image
          sed -i "s|sandboxImage: \"01community/01sandbox-codeinterpreter:[0-9.]*\"|sandboxImage: \"01community/01sandbox-codeinterpreter:${VERSION}\"|g" ./codeInspector/values.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./codeInspector/values.yaml
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin main

      - name: Sync Remote Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 148.113.4.247
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            cd /home/ktamang/01-Sandbox
            git pull origin main
