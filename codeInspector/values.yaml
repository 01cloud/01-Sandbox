# Agent Gateway component values
agentgateway:
  enabled: true
  namespace: agentgateway-system
  httproute:
    hostnames:
      - dipper-shun-glowing.ngrok-free.dev
    backendService:
      name: sandbox-api-service
      port: 80
  gateway:
    gatewayClassName: agentgateway
    listeners:
      - protocol: HTTP
        port: 80
        name: http
  policy:
    authenticationType: "jwt"
    jwtMode: "Strict"
  # No secret section needed for gateway as JWKS is inline in policy

# API Server component values
apiServer:
  enabled: true
  namespace: opensandbox-system
  configMap:
    PYTHONUNBUFFERED: "1"
    APP_ENV: "production"
    PORT: "8000"
    BACKEND_URL_OPENSANDBOX: "http://opensandbox-server.opensandbox-system.svc.cluster.local"
    GATEWAY_SECRET_NAME: "apikey"
    GATEWAY_SECRET_NAMESPACE: "agentgateway-system"
    GATEWAY_SECRET_KEY: "api-key"
    JWT_ALGORITHM: "HS256"
    JWT_EXPIRATION_MINUTES: "60"
    JWT_ISSUER: "code-inspector"
    JWT_ALGORITHM: "RS256"
    AUTH0_DOMAIN: "dev-axwc0ui527kw0c5d.us.auth0.com"
    AUTH0_AUDIENCE: "https://code-inspector-api"
    JWT_PUBLIC_JWKS: |
      {"keys": [{"kty": "RSA", "use": "sig", "kid": "code-inspector-key-01", "alg": "RS256", "n": "7eXFpr2rANKszQYSKd-bDRy1-M0tsatbwpr0BGkMOsZMHRph3bv9kLB0TuyLJ09VXDdmUpiYLGd6oQr3iKhtk3oe1_-p6aS7JKTZ-YCQW7TPRQget7lxWZj9l9a-E1WM-JSBjc7tXsGsKjVS9eDC-18gKbS4SnZhxhYwf08flLYa1nHhxuaUbxe7YNzqB6VMIAzt4iyC0LS3cm_CCI8hNg5RjbFkZXE_IC0rdRScLotfWOX2rgSdEH83hA41C8Nx0WICnQ6HysrBIxTfiUiQD4ieKb6HlK4Tr25hUhW_rcshhvcGyBAzQKYtadd51kADr4a0G09U95zby4pCasN-0w", "e": "AQAB"}]}
  secret:
    E2B_API_KEY: ""
  deployment:
    replicaCount: 1
    image:
      repository: fastapi
      tag: "1.0.0"
      pullPolicy: Never
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    className: nginx
    host: sandbox-api.local
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Dashboard component values
dashboard:
  enabled: true
  namespace: opensandbox-system
  replicaCount: 1
  image:
    repository: dashboard
    tag: "1.0.0"
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 80

# MetalLB component values
metallb:
  enabled: true
  namespace: metallb-system
  ipAddressPool:
    addresses:
      - 172.18.0.200-172.18.0.250
  l2Advertisement:
    enabled: true

# Kind Cluster component values
kindCluster:
  enabled: false
  namespace: kind-cluster
  runtimeClass:
    name: gvisor
    handler: runsc



# OpenSandbox component values
opensandbox:
  enabled: true
  namespace: opensandbox-system
  controller:
    replicaCount: 1
    image:
      repository: opensandbox-controller
      tag: 1.0.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  server:
    replicaCount: 1
    image:
      repository: opensandbox-server
      tag: 1.0.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      enabled: true
      pvcName: "scan-pvc"
      size: "10Gi"
      accessMode: "ReadWriteMany"
      mountPath: "/data"



# OpenSandbox Resource Pool component values
opensandboxResourcePool:
  enabled: false
  namespace: opensandbox-system
  pool:
    name: my-sandbox-pool
    container:
      image: codeinterpreter:3.1.0
      ports:
        - containerPort: 44772
        - containerPort: 54321
    capacitySpec:
      bufferMin: 3
      bufferMax: 10
      poolMin: 1
      poolMax: 50