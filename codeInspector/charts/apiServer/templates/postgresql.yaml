{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      initContainers:
      - name: fix-corruption
        image: postgres:15-alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            if [ -f /var/lib/postgresql/data/global/pg_control ]; then
              echo "Existing database found, checking for corruption..."
              pg_resetwal -f /var/lib/postgresql/data || echo "Recovery not needed or failed."
            else
              echo "New database, skipping recovery."
            fi
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.user | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgresql.password | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.database | quote }}
        - name: PGDATA
          value: /var/lib/postgresql/data
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgresql.host }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: postgresql
  ports:
  - port: {{ .Values.postgresql.port }}
    targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: {{ .Values.namespace }}
spec:
  storageClassName: {{ .Values.postgresql.storageClassName }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage }}
{{- end }}
