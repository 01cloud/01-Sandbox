# =============================================================================
# OpenClaw + OpenSandbox — Kubernetes Manifests
# examples/openclaw/k8s/manifest.yaml
#
# What this does:
#   1. Runs a dedicated "openclaw-runner" Pod that executes main.py from the
#      OpenSandbox openclaw example.
#   2. main.py calls the OpenSandbox Lifecycle API (POST /v1/sandboxes) to
#      create a sandbox for the OpenClaw gateway container, waits until it is
#      healthy, then prints the reachable endpoint.
#
# Prerequisites:
#   - OpenSandbox server deployed in your cluster (see kubernetes/ in the repo).
#   - A Service named "opensandbox-server" in namespace "opensandbox-system"
#     (or update OPENSANDBOX_SERVER_URL below).
#   - kubectl apply -f manifest.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Namespace
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/part-of: openclaw-opensandbox

---
# ---------------------------------------------------------------------------
# 2. Secret — sensitive values (base64-encode your real tokens before applying)
#
#    echo -n 'your-token' | base64
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw
type: Opaque
stringData:
  # Token that OpenClaw gateway will validate on incoming requests.
  # Override with a real secret in production.
  OPENCLAW_GATEWAY_TOKEN: "dummy-token-for-sandbox"
  # OpenSandbox server API key (leave empty if auth is disabled locally).
  OPEN_SANDBOX_API_KEY: ""

---
# ---------------------------------------------------------------------------
# 3. ConfigMap — non-sensitive runtime configuration
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  # Full in-cluster URL of the OpenSandbox server.
  # Adjust namespace / service name to match your deployment.
  OPENSANDBOX_SERVER_URL: "http://opensandbox-server.opensandbox-system.svc.cluster.local:8080"

  # Container image used for the OpenClaw gateway sandbox.
  OPENCLAW_IMAGE: "ghcr.io/openclaw/openclaw:latest"

  # Port that OpenClaw listens on inside the sandbox container.
  OPENCLAW_GATEWAY_PORT: "18789"

  # Maximum time (seconds) to wait for the sandbox to become healthy.
  OPENCLAW_TIMEOUT_SECS: "3600"

  # Python script that calls the OpenSandbox API to create the sandbox.
  # Mirrors examples/openclaw/main.py from alibaba/OpenSandbox.
  main.py: |
    #!/usr/bin/env python3
    """
    OpenClaw Gateway — OpenSandbox launcher (Kubernetes pod variant)

    Calls the OpenSandbox Lifecycle API to create a sandbox running the
    OpenClaw gateway image, polls until the gateway responds HTTP 200,
    then prints the reachable endpoint.
    """
    import os
    import sys
    import time
    import asyncio
    from datetime import timedelta

    import requests
    from opensandbox import Sandbox
    from opensandbox.config import ConnectionConfig

    # ── Configuration ─────────────────────────────────────────────────────────
    SERVER_URL   = os.environ["OPENSANDBOX_SERVER_URL"].rstrip("/")
    IMAGE        = os.environ.get("OPENCLAW_IMAGE", "ghcr.io/openclaw/openclaw:latest")
    GATEWAY_PORT = int(os.environ.get("OPENCLAW_GATEWAY_PORT", "18789"))
    TIMEOUT_SECS = int(os.environ.get("OPENCLAW_TIMEOUT_SECS", "3600"))
    API_KEY      = os.environ.get("OPEN_SANDBOX_API_KEY", "")
    GW_TOKEN     = os.environ.get("OPENCLAW_GATEWAY_TOKEN", "dummy-token-for-sandbox")

    async def main() -> None:
        print(
            f"Creating openclaw sandbox with image={IMAGE} "
            f"on OpenSandbox server {SERVER_URL}..."
        )

        # ── 1. Build connection config ─────────────────────────────────────────
        # Strip the scheme so ConnectionConfig receives only host[:port].
        domain = SERVER_URL.removeprefix("https://").removeprefix("http://")
        use_tls = SERVER_URL.startswith("https://")

        config_kwargs = dict(
            domain=domain,
            request_timeout=timedelta(seconds=60),
        )
        if API_KEY:
            config_kwargs["api_key"] = API_KEY
        # ConnectionConfig accepts an `ssl` kwarg for plain-HTTP in-cluster use.
        if not use_tls:
            config_kwargs["ssl"] = False

        connection_config = ConnectionConfig(**config_kwargs)

        # ── 2. Create the sandbox via the OpenSandbox API ──────────────────────
        sandbox = await Sandbox.create(
            IMAGE,
            connection_config=connection_config,
            env={
                "OPENCLAW_GATEWAY_TOKEN": GW_TOKEN,
                # Bind to all interfaces so the OpenSandbox ingress can reach it.
                "OPENCLAW_BIND": "0.0.0.0",
            },
            timeout=timedelta(seconds=TIMEOUT_SECS),
        )

        async with sandbox:
            # ── 3. Resolve the exposed endpoint ───────────────────────────────
            endpoint_info = await sandbox.endpoints.get(GATEWAY_PORT)
            host = endpoint_info.host
            port = endpoint_info.port
            url  = f"http://{host}:{port}"

            # ── 4. Poll until the gateway is ready ────────────────────────────
            t0 = time.monotonic()
            while True:
                elapsed = time.monotonic() - t0
                try:
                    resp = requests.get(url, timeout=5)
                    if resp.status_code == 200:
                        print(f"[check] sandbox ready after {elapsed:.1f}s")
                        break
                except requests.exceptions.RequestException:
                    pass

                if elapsed > TIMEOUT_SECS:
                    print("ERROR: timed out waiting for openclaw gateway", file=sys.stderr)
                    sys.exit(1)

                await asyncio.sleep(2)

            print(f"Openclaw started finished. Please refer to {host}:{port}")

            # Keep the pod alive so the sandbox TTL is maintained.
            # Remove the loop below if you only need a one-shot launcher.
            while True:
                await asyncio.sleep(60)

    if __name__ == "__main__":
        asyncio.run(main())

---
# ---------------------------------------------------------------------------
# 4. ServiceAccount + RBAC (least-privilege; only needs pod-level read)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-runner
  namespace: openclaw

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-runner
  namespace: openclaw
rules:
  # Allow the runner to read its own namespace (useful for debugging).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-runner
  namespace: openclaw
subjects:
  - kind: ServiceAccount
    name: openclaw-runner
    namespace: openclaw
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: openclaw-runner

---
# ---------------------------------------------------------------------------
# 5. Pod — runs main.py which calls the OpenSandbox API to create the sandbox
#
#    The pod itself is lightweight (python:3.11-slim); the heavy OpenClaw
#    container runs *inside* an OpenSandbox-managed sandbox, not here.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: openclaw-runner
  namespace: openclaw
  labels:
    app: openclaw-runner
    app.kubernetes.io/part-of: openclaw-opensandbox
spec:
  serviceAccountName: openclaw-runner
  restartPolicy: OnFailure

  # ── Init container: install Python dependencies ───────────────────────────
  initContainers:
    - name: install-deps
      image: python:3.11-slim
      command:
        - sh
        - -c
        - |
          pip install --quiet --no-cache-dir opensandbox requests
          cp /scripts/main.py /app/main.py
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: app
          mountPath: /app

  # ── Main container: runs main.py ──────────────────────────────────────────
  containers:
    - name: openclaw-runner
      image: python:3.11-slim
      command:
        - sh
        - -c
        - |
          pip install --quiet --no-cache-dir --no-warn-script-location opensandbox requests
          python /app/main.py

      env:
        # Suppress pip root user warning
        - name: PIP_ROOT_USER_ACTION
          value: "ignore"
        # From ConfigMap
        - name: OPENSANDBOX_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: openclaw-config
              key: OPENSANDBOX_SERVER_URL
        - name: OPENCLAW_IMAGE
          valueFrom:
            configMapKeyRef:
              name: openclaw-config
              key: OPENCLAW_IMAGE
        - name: OPENCLAW_GATEWAY_PORT
          valueFrom:
            configMapKeyRef:
              name: openclaw-config
              key: OPENCLAW_GATEWAY_PORT
        - name: OPENCLAW_TIMEOUT_SECS
          valueFrom:
            configMapKeyRef:
              name: openclaw-config
              key: OPENCLAW_TIMEOUT_SECS
        # From Secret
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        - name: OPEN_SANDBOX_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPEN_SANDBOX_API_KEY

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"

      volumeMounts:
        - name: app
          mountPath: /app

  volumes:
    - name: scripts
      configMap:
        name: openclaw-config
        items:
          - key: main.py
            path: main.py
    - name: app
      emptyDir: {}

---
# ---------------------------------------------------------------------------
# 6. (Optional) Service — expose the runner's logs endpoint if you add
#    a health/status HTTP server to main.py in the future.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: openclaw-runner
  namespace: openclaw
  labels:
    app: openclaw-runner
spec:
  selector:
    app: openclaw-runner
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP
  type: ClusterIP