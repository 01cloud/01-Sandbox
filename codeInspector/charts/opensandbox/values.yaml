namespace: opensandbox-system

controller:
  replicaCount: 1
  image:
    repository: opensandbox/controller
    tag: v1.0.0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

server:
  replicaCount: 1
  image:
    repository: opensandbox/server
    tag: v1.0.0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi