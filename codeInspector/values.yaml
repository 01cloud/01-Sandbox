      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  ingress:
    enabled: false
    className: nginx
    host: api-sandbox.01security.com
