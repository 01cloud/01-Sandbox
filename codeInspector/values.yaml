################################################################
# This chart aggregates values from all sub-charts.
################################################################

global:
  apiRoutePrefix: "/api/v1/01sbx"
  JWT_PUBLIC_JWKS: "" 

################################################################
# Agent Gateway component values
################################################################
agentgateway:
  enabled: true
  namespace: agentgateway-system
  httproute:
    hostnames:
      - api-sandbox.01security.com
    backendService:
      name: sandbox-api-service
      port: 80
  gateway:
    gatewayClassName: agentgateway
    addresses:
      - value: 148.113.4.247
    listeners:
      - protocol: HTTP
        port: 80
        name: http
      - protocol: HTTPS
        port: 443
        name: https
        tls:
          certificateRefs:
            - name: agentgateway-tls
  policy:
    authenticationType: "jwt"
    jwtMode: "Strict"


################################################################
# API Server component values
################################################################
apiServer:
  enabled: true
  namespace: opensandbox-system
  configMap:
    PYTHONUNBUFFERED: "1"
    APP_ENV: "production"
    PORT: "8000"
    BACKEND_URL_OPENSANDBOX: "http://opensandbox-server.opensandbox-system.svc.cluster.local"
    GATEWAY_SECRET_NAME: "apikey"
    GATEWAY_SECRET_NAMESPACE: "agentgateway-system"
    GATEWAY_SECRET_KEY: "api-key"
    JWT_ALGORITHM: "HS256"
    JWT_EXPIRATION_MINUTES: "60"
    JWT_ISSUER: "01 Sandbox"
    JWT_ALGORITHM: "RS256"
    AUTH0_DOMAIN: "dev-1u502t8piuwyzb28.us.auth0.com"
    AUTH0_AUDIENCE: "https://api-sandbox"
    OPENSANDBOX_ROUTE_PREFIX: "{{ .Values.global.apiRoutePrefix }}"
    DASHBOARD_BACKENDS_JSON: '[{"id":"Z1_SANDBOX","name":"01 Sandbox","description":"Production-grade hardened cluster for secure code execution.","icon":"terminal","color":"indigo","baseUrl":"https://api-sandbox.01security.com{{ .Values.global.apiRoutePrefix }}","documentationUrl":"https://api-sandbox.01security.com{{ .Values.global.apiRoutePrefix }}/docs"}]'
    JWT_PUBLIC_JWKS: "" 

  secret:
    E2B_API_KEY: ""
    JWT_PRIVATE_KEY: "" 
  deployment:
    replicaCount: 1
    image:
      repository: 01community/01sandbox-api
      tag: "1.0.1"
      pullPolicy: Always
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  ingress:
    enabled: false
    className: nginx
    host: api-sandbox.01security.com
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  postgresql:

    enabled: true
    host: "postgresql-service"
    port: 5432
    user: "postgres"
    password: "password123"
    database: "apikeys"
    storage: "5Gi"
    storageClassName: "longhorn"
  redis:
    enabled: true
    host: "redis-service"
    port: 6379
    password: ""

################################################################
# MetalLB component values
################################################################
metallb:
  enabled: true
  namespace: metallb-system
  ipAddressPool:
    addresses:
      # - 172.18.0.200-172.18.0.250
      - 148.113.4.247/32
  l2Advertisement:
    enabled: true

################################################################
# Kind Cluster component values
################################################################
kindCluster:
  enabled: false
  namespace: kind-cluster
  runtimeClass:
    name: gvisor
    handler: runsc

################################################################
# OpenSandbox component values
################################################################
opensandbox:
  enabled: true
  namespace: opensandbox-system
  controller:
    replicaCount: 1
    image:
      repository: 01community/01sandbox-opensandbox-controller
      tag: 1.0.0
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  server:
    replicaCount: 1
    sandboxImage: "01community/01sandbox-codeinterpreter:1.0.4"
    image:
      repository: 01community/01sandbox-opensandbox-server
      tag: 1.0.0
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      enabled: true
      pvcName: "scan-pvc"
      size: "10Gi"
      accessMode: "ReadWriteMany"
      mountPath: "/data"
      storageClassName: "longhorn"

################################################################
# OpenSandbox Resource Pool component values
################################################################
opensandboxResourcePool:
  enabled: false
  namespace: opensandbox-system
  pool:
    name: my-sandbox-pool
    container:
      image: 01community/01sandbox-codeinterpreter:1.0.0
      ports:
        - containerPort: 44772
        - containerPort: 54321
    capacitySpec:
      bufferMin: 3
      bufferMax: 10
      poolMin: 1
      poolMax: 50