name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'apiServer/**'
      - 'code-interpreter/**'
      - 'codeInspector/**'
      - 'opensandbox-server/**'
      - 'opensandbox-controller/**'
      - 'codeInspector/**'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Next Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"

  filter:
    needs: versioning
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      scanner: ${{ steps.filter.outputs.scanner }}
      infra: ${{ steps.filter.outputs.infra }}
      server: ${{ steps.filter.outputs.server }}
      controller: ${{ steps.filter.outputs.controller }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apiServer/**'
            scanner:
              - 'code-interpreter/**'
            infra:
              - 'codeInspector/**'
            server:
              - 'opensandbox-server/**'
            controller:
              - 'opensandbox-controller/**'
            codeInspector:
              - 'codeInspector/**'

  build-api:
    needs: [filter, versioning]
    if: needs.filter.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API Server
        uses: docker/build-push-action@v5
        with:
          context: ./apiServer/fastapi/
          push: true
          tags: |
            01community/01sandbox-api:latest
            01community/01sandbox-api:${{ needs.versioning.outputs.version }}

  build-scanner:
    needs: [filter, versioning]
    if: needs.filter.outputs.scanner == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Scanner
        uses: docker/build-push-action@v5
        with:
          context: ./code-interpreter
          push: true
          tags: |
            01community/01sandbox-codeinterpreter:latest
            01community/01sandbox-codeinterpreter:${{ needs.versioning.outputs.version }}
  
  build-server:
    needs: [filter, versioning]
    if: needs.filter.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./opensandbox-server/docker-build/
          push: true
          tags: |
            01community/01sandbox-opensandbox-server:latest
            01community/01sandbox-opensandbox-server:${{ needs.versioning.outputs.version }}

  build-controller:
    needs: [filter, versioning]
    if: needs.filter.outputs.controller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Controller
        uses: docker/build-push-action@v5
        with:
          context: ./opensandbox-controller/docker-build/
          push: true
          tags: |
            01community/01sandbox-opensandbox-controller:latest
            01community/01sandbox-opensandbox-controller:${{ needs.versioning.outputs.version }}

  deploy:
    needs: [filter, versioning, build-api, build-scanner, build-server, build-controller]
    if: |
      always() &&
      (needs.filter.outputs.infra == 'true' || 
       needs.build-api.result == 'success' || 
       needs.build-scanner.result == 'success' ||
       needs.build-server.result == 'success' ||
       needs.build-controller.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          # Patch Kubeconfig to use public IP instead of localhost
          sed -i 's/127.0.0.1/148.113.4.247/g' ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Helm Lint
        run: helm lint ./codeInspector
      - name: Cleanup Stuck Helm Release
        run: |
          echo "Checking for stuck Helm releases..."
          # Delete any Helm secrets that are stuck in 'pending' state
          kubectl delete secret -n default -l "owner=helm,name=codeinspector,status=pending-upgrade" || true
          kubectl delete secret -n default -l "owner=helm,name=codeinspector,status=pending-install" || true

      - name: Deploy to RKE2
        run: |
          set -x
          VERSION=${{ needs.versioning.outputs.version }}
          echo "Starting deployment..."
          
          # Build the Helm command dynamically
          HELM_CMD="helm upgrade --install codeinspector ./codeInspector -n default --rollback-on-failure --debug --timeout 5m0s --values ./codeInspector/values.yaml"
          
          if [ "${{ needs.filter.outputs.api }}" == "true" ]; then
            HELM_CMD="$HELM_CMD --set apiServer.deployment.image.tag=${VERSION}"
          fi
          if [ "${{ needs.filter.outputs.controller }}" == "true" ]; then
            HELM_CMD="$HELM_CMD --set opensandbox.controller.image.tag=${VERSION}"
          fi
          if [ "${{ needs.filter.outputs.server }}" == "true" ]; then
            HELM_CMD="$HELM_CMD --set opensandbox.server.image.tag=${VERSION}"
          fi
          if [ "${{ needs.filter.outputs.scanner }}" == "true" ]; then
            HELM_CMD="$HELM_CMD --set opensandbox.server.sandboxImage=01community/01sandbox-codeinterpreter:${VERSION}"
          fi
          
          eval $HELM_CMD
            
      - name: Update values.yaml and Tag Repository
        run: |
          set -x
          VERSION=${{ needs.versioning.outputs.version }}
          UPDATED=false
          
          echo "🔍 Checking for changes to apply version ${VERSION}..."
          
          # Update API Tag
          if [ "${{ needs.filter.outputs.api }}" == "true" ]; then
            echo "Updating API Server tag..."
            sed -i "/apiServer:/,/tag:/ s/tag: [\"']\?[0-9.]*[\"']\?/tag: \"${VERSION}\"/" ./codeInspector/values.yaml
            UPDATED=true
          fi
          
          # Update Controller Tag
          if [ "${{ needs.filter.outputs.controller }}" == "true" ]; then
            echo "Updating Controller tag..."
            sed -i "/controller:/,/tag:/ s/tag: [\"']\?[0-9.]*[\"']\?/tag: \"${VERSION}\"/" ./codeInspector/values.yaml
            UPDATED=true
          fi
          
          # Update Server Tag
          if [ "${{ needs.filter.outputs.server }}" == "true" ]; then
            echo "Updating Server tag..."
            sed -i "/server:/,/tag:/ s/tag: [\"']\?[0-9.]*[\"']\?/tag: \"${VERSION}\"/" ./codeInspector/values.yaml
            UPDATED=true
          fi

          # Update Sandbox Image (Scanner)
          if [ "${{ needs.filter.outputs.scanner }}" == "true" ]; then
            echo "Updating Sandbox Scanner image..."
            # Update the specialized sandboxImage field (handles quotes)
            sed -i "s|sandboxImage: [\"']\?01community/01sandbox-codeinterpreter:[0-9.]*[\"']\?|sandboxImage: \"01community/01sandbox-codeinterpreter:${VERSION}\"|g" ./codeInspector/values.yaml
            # Update the Resource Pool image if it exists
            sed -i "s|image: [\"']\?01community/01sandbox-codeinterpreter:[0-9.]*[\"']\?|image: \"01community/01sandbox-codeinterpreter:${VERSION}\"|g" ./codeInspector/values.yaml
            UPDATED=true
          fi
          
          if [ "$UPDATED" == "true" ]; then
            echo "Changes applied. Checking if commit is needed..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add ./codeInspector/values.yaml
            
            # Only commit if there are actual changes
            if ! git diff --cached --quiet; then
              git commit -m "chore: bump versions to ${VERSION} [skip ci]"
            else
              echo "No changes to values.yaml, skipping commit."
            fi
            
            # Always try to push tags for versioning persistence
            git tag -f "v${VERSION}"
            git push origin main --tags --force
          else
            echo "No component changes detected, skipping repository update."
          fi

      - name: Sync Remote Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 148.113.4.247
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            cd /home/ktamang/01-Sandbox
            git pull origin main
