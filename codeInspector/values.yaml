################################################################
# Agent Gateway component values
################################################################
agentgateway:
  enabled: true
  namespace: agentgateway-system
  httproute:
    hostnames:
      - api-sandbox.01security.com
    backendService:
      name: sandbox-api-service
      port: 80
  gateway:
    gatewayClassName: agentgateway
    addresses:
      - value: 148.113.4.247
    listeners:
      - protocol: HTTP
        port: 80
        name: http
      - protocol: HTTPS
        port: 443
        name: https
        tls:
          certificateRefs:
            - name: agentgateway-tls
  policy:
    authenticationType: "jwt"
    jwtMode: "Strict"
  # No secret section needed for gateway as JWKS is inline in policy

