      nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  postgresql:

    enabled: true
    host: "postgresql-service"
    port: 5432
    user: "postgres"
    password: "password123"
    database: "apikeys"
    storage: "5Gi"
    storageClassName: "longhorn"
  redis:
    enabled: true
    host: "redis-service"
    port: 6379
    password: ""

################################################################
# MetalLB component values
################################################################
metallb:
  enabled: true
  namespace: metallb-system
  ipAddressPool:
    addresses:
      # - 172.18.0.200-172.18.0.250
      - 148.113.4.247/32
  l2Advertisement:
    enabled: true

################################################################
# Kind Cluster component values
################################################################
kindCluster:
  enabled: false
  namespace: kind-cluster
  runtimeClass:
    name: gvisor
    handler: runsc

################################################################
# OpenSandbox component values
################################################################
opensandbox:
  enabled: true
  namespace: opensandbox-system
  controller:
    replicaCount: 1
    image:
      repository: 01community/01sandbox-opensandbox-controller
      tag: 1.0.0
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  server:
    replicaCount: 1
    sandboxImage: "01community/01sandbox-codeinterpreter:1.0.0"
    image:
      repository: 01community/01sandbox-opensandbox-server
      tag: 1.0.0
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      enabled: true
      pvcName: "scan-pvc"
      size: "10Gi"
      accessMode: "ReadWriteMany"
      mountPath: "/data"
      storageClassName: "longhorn"

################################################################
# OpenSandbox Resource Pool component values
################################################################
opensandboxResourcePool:
  enabled: false
  namespace: opensandbox-system
  pool:
    name: my-sandbox-pool
    container:
      image: 01community/01sandbox-codeinterpreter:1.0.0
      ports:
        - containerPort: 44772
        - containerPort: 54321
    capacitySpec:
      bufferMin: 3
      bufferMax: 10
      poolMin: 1
      poolMax: 50