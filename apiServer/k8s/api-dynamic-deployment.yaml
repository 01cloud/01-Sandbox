---
# 1. Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox
  labels:
    app: sandbox-api

---
# 2. ConfigMap — backend registry + routing config
#
# Convention: SANDBOX_<ID>_URL  where <ID> is a short alphanumeric identifier.
# The gateway scans ALL env vars matching this pattern at startup.
# Adding a new backend = adding three lines here and re-applying the manifest.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-api-config
  namespace: sandbox
data:
  # ── App config ──────────────────────────────────────────────────────────────
  PYTHONUNBUFFERED:    "1"
  APP_ENV:             "production"
  PORT:                "8000"

  # ── Routing mode ────────────────────────────────────────────────────────────
  # Options: round_robin | weighted | least_used | explicit
  SANDBOX_ROUTING_MODE: "round_robin"

  # ── Backend: PRIMARY (OpenSandbox) ──────────────────────────────────────────
  SANDBOX_PRIMARY_URL:    "http://opensandbox-server.opensandbox-system.svc.cluster.local"
  SANDBOX_PRIMARY_NAME:   "Primary OpenSandbox"
  SANDBOX_PRIMARY_WEIGHT: "10"

  # ── Backend: GPU sandbox (example — uncomment when ready) ───────────────────
  # SANDBOX_GPU_URL:    "http://gpu-sandbox.ml-system.svc.cluster.local"
  # SANDBOX_GPU_NAME:   "GPU Sandbox"
  # SANDBOX_GPU_WEIGHT: "5"

  # ── Backend: Edge sandbox (example — uncomment when ready) ──────────────────
  # SANDBOX_EDGE_URL:    "http://edge-sandbox.edge-system.svc.cluster.local"
  # SANDBOX_EDGE_NAME:   "Edge Sandbox"
  # SANDBOX_EDGE_WEIGHT: "1"

---
# 3. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-api
  namespace: sandbox
  labels:
    app: sandbox-api
    version: "2.0.0"
spec:
  replicas: 2                            # ≥2 for HA
  selector:
    matchLabels:
      app: sandbox-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0                  # never drop below desired count
  template:
    metadata:
      labels:
        app: sandbox-api
        version: "1.0.0"
      annotations:
        # Force pod restart when ConfigMap changes (checksum trick)
        # Update this value after editing the ConfigMap to trigger a rollout:
        #   kubectl rollout restart deployment/sandbox-api -n sandbox
        configmap-checksum: "change-me-to-force-restart"
    spec:
      # ── Security context ────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        fsGroup:      1000

      containers:
        - name:            sandbox-api
          image:           fastapi:1.0.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8000
              protocol:      TCP

          # ── Environment — pull all backend registrations from ConfigMap ──────
          envFrom:
            - configMapRef:
                name: sandbox-api-config

          # ── Health checks ────────────────────────────────────────────────────
          #  /health returns 200 if ANY backend is reachable, 503 if none are.
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds:       20
            timeoutSeconds:      5
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 12
            periodSeconds:     5

          # ── Resources ────────────────────────────────────────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

          # ── Security ─────────────────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name:      tmp
              mountPath: /tmp

      volumes:
        - name:    tmp
          emptyDir: {}

      restartPolicy: Always

      # Spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew:           1
          topologyKey:       kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: sandbox-api

---
# 4. Service — ClusterIP (internal)
apiVersion: v1
kind: Service
metadata:
  name: sandbox-api-service
  namespace: sandbox
  labels:
    app: sandbox-api
spec:
  selector:
    app: sandbox-api
  ports:
    - name:       http
      protocol:   TCP
      port:       80
      targetPort: 8000
  type: ClusterIP

---
# 5. Ingress
#    Install nginx ingress controller if not present:
#    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-api-ingress
  namespace: sandbox
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target:    /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: sandbox-api.local             # replace with your actual domain
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: sandbox-api-service
                port:
                  number: 80

---
# 6. HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sandbox-api-hpa
  namespace: sandbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sandbox-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 80

---
# 7. PodDisruptionBudget — keep ≥1 pod alive during node drains / upgrades
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sandbox-api-pdb
  namespace: sandbox
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sandbox-api